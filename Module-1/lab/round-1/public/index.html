<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth System — Login / Register</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="tabs">
        <button class="tab active" data-tab="login">Login</button>
        <button class="tab" data-tab="register">Register</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="loginForm" class="tab-content active" novalidate>
        <h1 class="form-title">Welcome back</h1>

        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" required />
          <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
        </div>

        <div id="loginError" class="alert alert-error hidden"></div>

        <button type="submit" class="btn btn-primary">Log in</button>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="tab-content" novalidate>
        <h1 class="form-title">Create account</h1>

        <div class="field">
          <label for="regUsername">Username</label>
          <input id="regUsername" type="text" autocomplete="username" placeholder="johndoe" required minlength="3" maxlength="30" />
        </div>

        <div class="field">
          <label for="regEmail">Email</label>
          <input id="regEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="regPassword">Password</label>
          <input id="regPassword" type="password" autocomplete="new-password" placeholder="Min. 8 characters" required minlength="8" />
          <div class="password-strength" id="strengthBar"></div>
        </div>

        <div class="field">
          <label for="regConfirm">Confirm Password</label>
          <input id="regConfirm" type="password" autocomplete="new-password" placeholder="Repeat password" required />
        </div>

        <div id="registerError" class="alert alert-error hidden"></div>
        <div id="registerSuccess" class="alert alert-success hidden"></div>

        <button type="submit" class="btn btn-primary">Create account</button>
      </form>

      <!-- FORGOT PASSWORD FORM -->
      <form id="forgotForm" class="tab-content" novalidate>
        <h1 class="form-title">Reset password</h1>
        <p class="subtitle">Enter your email and we'll send you a reset link.</p>

        <div class="field">
          <label for="forgotEmail">Email</label>
          <input id="forgotEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>

        <div id="forgotError" class="alert alert-error hidden"></div>
        <div id="forgotSuccess" class="alert alert-success hidden"></div>

        <button type="submit" class="btn btn-primary">Send reset link</button>
        <button type="button" class="btn btn-ghost" id="backToLogin">← Back to login</button>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
