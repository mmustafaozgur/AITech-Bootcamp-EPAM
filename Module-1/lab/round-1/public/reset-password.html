<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1 class="form-title">Set new password</h1>
      <p class="subtitle">Enter and confirm your new password below.</p>

      <form id="resetForm" novalidate>
        <div class="field">
          <label for="newPassword">New Password</label>
          <input id="newPassword" type="password" autocomplete="new-password" placeholder="Min. 8 characters" required minlength="8" />
          <div class="password-strength" id="strengthBar"></div>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Repeat new password" required />
        </div>

        <div id="resetError" class="alert alert-error hidden"></div>
        <div id="resetSuccess" class="alert alert-success hidden"></div>

        <button type="submit" class="btn btn-primary">Set new password</button>
        <a href="/" class="btn btn-ghost" style="text-align:center">← Back to login</a>
      </form>
    </div>
  </div>

  <script src="/js/reset-password.js"></script>
</body>
</html>
